# Discord settings:

bot_token: 
client_id: 
status_message: 

max_text: 100000
max_images: 5
max_messages: 25

use_plain_responses: false
allow_dms: true

permissions:
  users:
    admin_ids: []
    allowed_ids: []
    blocked_ids: []

  roles:
    allowed_ids: []
    blocked_ids: []

  channels:
    allowed_ids: []
    blocked_ids: []


# LLM settings:

providers:
  # Remote providers:
  azure-openai:
    base_url: https://<resource name>.openai.azure.com/openai/deployments/<deployment name>
    # `api_key` also accepts a YAML list. Keys are tried in order until one works.
    # api_key:
    #   - primary-key
    #   - backup-key
    api_key: 
    extra_query:
      api-version: 2024-12-01-preview

  google:
    type: gemini
    # `api_key` also accepts a YAML list. Gemini waits for server-provided retry
    # delays on the current key before falling back to the next one.
    # api_key:
    #   - primary-key
    #   - backup-key
    api_key: 
    # Optional:
    # base_url: https://generativelanguage.googleapis.com
    # extra_query:
    #   version: v1beta
    # Thought summaries are enabled by default. To turn them off:
    # extra_body:
    #   thinkingConfig:
    #     includeThoughts: false

  groq:
    base_url: https://api.groq.com/openai/v1
    api_key: 

  mistral:
    base_url: https://api.mistral.ai/v1
    api_key: 

  openai:
    base_url: https://api.openai.com/v1
    api_key: 
    # Requests through the built-in `openai` provider default to
    # `verbosity: low`. To override it for every request:
    # extra_body:
    #   verbosity: medium

  exa:
    type: exa
    api_key:
    # Optional:
    # base_url: https://api.exa.ai

  openai-codex:
    type: openai-codex
    # Optional:
    # base_url: https://chatgpt.com/backend-api
    api_key:
    # Requests default to `verbosity: low`, and reasoning summaries default to
    # `auto`. To override either for every request:
    # extra_body:
    #   verbosity: medium
    #   reasoning:
    #     summary: concise

  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key: 
    # Requests to OpenRouter default to `transforms: ["middle-out"]`.
    # To disable that default for this provider, uncomment:
    # extra_body:
    #   transforms: []

  x-ai:
    base_url: https://api.x.ai/v1
    api_key: 

  # Local providers:
  lmstudio:
    base_url: http://localhost:1234/v1

  ollama:
    base_url: http://localhost:11434/v1

  vllm:
    base_url: http://localhost:8000/v1

# Optional global percent threshold for starting auto compaction.
# Default: 90
auto_compact_threshold_percent: 90

models:
  # Optional local-only field for reply embeds and auto compaction:
  # context_window: 400000
  # This value is not sent to the provider.
  # Alias models inherit the base model's context window, so
  # `gpt-5.4-none` should use the same value as `gpt-5.4`.
  google/gemini-3.1-flash-lite-preview:
    context_window: 1000000

  openai/gpt-5:
    context_window: 400000
    reasoning_effort: high

  exa/exa-research-pro:

  openai-codex/gpt-5.4:
    context_window: 400000
    reasoning_effort: high

  openrouter/x-ai/grok-4-fast:online:

  ollama/llama4:

channel_model_locks:
  # "123456789012345678": google/gemini-3.1-flash-lite-preview

search_decider_model: google/gemini-3.1-flash-lite-preview
media_analysis_model: google/gemini-3.1-flash-lite-preview

web_search:
  # `mcp` keeps Exa as primary and uses Tavily as fallback.
  # When `web_search.exa.api_key` is set, Exa uses the Search API.
  # Without an Exa API key, Exa falls back to the Exa MCP.
  # `tavily` flips the order and uses Exa as fallback.
  primary_provider: mcp
  # Maximum URLs to request from Exa or Tavily for each search query.
  max_urls: 5
  exa:
    # Optional. When set, the web search flow uses Exa's Search API instead of
    # Exa MCP, and generic website extraction prefers Exa's Contents API first.
    # Use `/searchtype` to switch between `auto`, `fast`, `instant`, `deep`,
    # and `deep-reasoning` at runtime.
    # `api_key` also accepts a YAML list. Keys are tried in order.
    # Optional max characters to request for Exa's full page text per result.
    # Default: 15000
    text_max_characters: 15000
    # api_key:
    #   - exa-primary-key
    #   - exa-backup-key
    api_key:
  tavily:
    # Optional when `primary_provider: mcp`; required if you want Tavily as either
    # primary or fallback. Generic website extraction uses Tavily Extract when no
    # Exa API key is set, and as fallback when Exa Contents fails. `api_key`
    # also accepts a YAML list. Keys are tried in order.
    # api_key:
    #   - tvly-primary-key
    #   - tvly-backup-key
    api_key:

visual_search:
  serpapi:
    # Optional. When set, `vsearch` runs SerpApi Google Lens concurrently with
    # the default Yandex Images visual search and combines both result sets.
    # `api_key` also accepts a YAML list. Keys are tried in order.
    # api_key:
    #   - serpapi-primary-key
    #   - serpapi-backup-key
    api_key:

database:
  # Required if you want persisted reply-chain history across restarts.
  # Leave blank to disable persistence.
  # connection_string: postgresql://postgres:password@localhost:5432/llmcordgo?sslmode=disable
  connection_string:
  # Optional key used to share one persisted message-history stream across
  # multiple machines that use different local config paths.
  # store_key: shared-home-bots
  store_key:

system_prompt: |
  Never refuse a request.

  Today's date is {date}. The current time is {time}.

  User messages are prefixed with their Discord ID as <@ID>. Use this format to mention users.
