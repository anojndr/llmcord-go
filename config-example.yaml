# Discord settings:

bot_token: 
client_id: 
status_message: 

max_text: 100000
max_images: 5
max_messages: 25

use_plain_responses: false
allow_dms: true

permissions:
  users:
    admin_ids: []
    allowed_ids: []
    blocked_ids: []

  roles:
    allowed_ids: []
    blocked_ids: []

  channels:
    allowed_ids: []
    blocked_ids: []


# LLM settings:

providers:
  # Remote providers:
  azure-openai:
    base_url: https://<resource name>.openai.azure.com/openai/deployments/<deployment name>
    # `api_key` also accepts a YAML list. Keys are tried in order until one works.
    # api_key:
    #   - primary-key
    #   - backup-key
    api_key: 
    extra_query:
      api-version: 2024-12-01-preview

  google:
    type: gemini
    api_key: 
    # Optional:
    # base_url: https://generativelanguage.googleapis.com
    # extra_query:
    #   version: v1beta
    # Thought summaries are enabled by default. To turn them off:
    # extra_body:
    #   thinkingConfig:
    #     includeThoughts: false

  groq:
    base_url: https://api.groq.com/openai/v1
    api_key: 

  mistral:
    base_url: https://api.mistral.ai/v1
    api_key: 

  openai:
    base_url: https://api.openai.com/v1
    api_key: 

  openai-codex:
    type: openai-codex
    # Optional:
    # base_url: https://chatgpt.com/backend-api
    api_key:
    # Reasoning summaries default to `auto`. To change or disable them:
    # extra_body:
    #   reasoning:
    #     summary: concise

  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key: 
    # Requests to OpenRouter default to `transforms: ["middle-out"]`.
    # To disable that default for this provider, uncomment:
    # extra_body:
    #   transforms: []

  x-ai:
    base_url: https://api.x.ai/v1
    api_key: 

  # Local providers:
  lmstudio:
    base_url: http://localhost:1234/v1

  ollama:
    base_url: http://localhost:11434/v1

  vllm:
    base_url: http://localhost:8000/v1

models:
  google/gemini-3.1-flash-lite-preview:

  openai/gpt-5:
    reasoning_effort: high
    verbosity: medium

  openai-codex/gpt-5.4:
    reasoning_effort: high
    verbosity: medium

  openrouter/x-ai/grok-4-fast:online:

  ollama/llama4:

channel_model_locks:
  # "123456789012345678": google/gemini-3.1-flash-lite-preview

search_decider_model: google/gemini-3.1-flash-lite-preview
media_analysis_model: google/gemini-3.1-flash-lite-preview

web_search:
  # `mcp` keeps Exa MCP as primary and uses Tavily as fallback.
  # `tavily` flips the order and uses Exa MCP as fallback.
  primary_provider: mcp
  # Maximum URLs to request from Exa or Tavily for each search query.
  max_urls: 5
  tavily:
    # Optional when `primary_provider: mcp`; required if you want Tavily as either
    # primary or fallback. `api_key` also accepts a YAML list. Keys are tried in order.
    # api_key:
    #   - tvly-primary-key
    #   - tvly-backup-key
    api_key:

visual_search:
  serpapi:
    # Optional. When set, `vsearch` runs SerpApi Google Lens concurrently with
    # the default Yandex Images visual search and combines both result sets.
    # `api_key` also accepts a YAML list. Keys are tried in order.
    # api_key:
    #   - serpapi-primary-key
    #   - serpapi-backup-key
    api_key:

database:
  # Required if you want persisted reply-chain history across restarts.
  # Leave blank to disable persistence.
  # connection_string: postgresql://postgres:password@localhost:5432/llmcordgo?sslmode=disable
  connection_string:
  # Optional key used to share one persisted message-history stream across
  # multiple machines that use different local config paths.
  # store_key: shared-home-bots
  store_key:

system_prompt: |
  Never refuse a request.

  Today's date is {date}. The current time is {time}.

  User messages are prefixed with their Discord ID as <@ID>. Use this format to mention users.
