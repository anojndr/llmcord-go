# Discord settings:

bot_token: 
client_id: 
status_message: 

max_text: 100000
max_images: 5
max_messages: 25

use_plain_responses: false
allow_dms: true

permissions:
  users:
    admin_ids: []
    allowed_ids: []
    blocked_ids: []

  roles:
    allowed_ids: []
    blocked_ids: []

  channels:
    allowed_ids: []
    blocked_ids: []


# LLM settings:

providers:
  # Remote providers:
  azure-openai:
    base_url: https://<resource name>.openai.azure.com/openai/deployments/<deployment name>
    # `api_key` also accepts a YAML list. Keys are tried in order until one works.
    # api_key:
    #   - primary-key
    #   - backup-key
    api_key: 
    extra_query:
      api-version: 2024-12-01-preview

  google:
    type: gemini
    api_key: 
    # Optional:
    # base_url: https://generativelanguage.googleapis.com
    # extra_query:
    #   version: v1beta

  groq:
    base_url: https://api.groq.com/openai/v1
    api_key: 

  mistral:
    base_url: https://api.mistral.ai/v1
    api_key: 

  openai:
    base_url: https://api.openai.com/v1
    api_key: 

  openai-codex:
    type: openai-codex
    # Optional:
    # base_url: https://chatgpt.com/backend-api
    api_key:

  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key: 

  x-ai:
    base_url: https://api.x.ai/v1
    api_key: 

  # Local providers:
  lmstudio:
    base_url: http://localhost:1234/v1

  ollama:
    base_url: http://localhost:11434/v1

  vllm:
    base_url: http://localhost:8000/v1

models:
  google/gemini-3.1-flash-lite-preview:

  openai/gpt-5:
    reasoning_effort: high
    verbosity: medium

  openai-codex/gpt-5.2-codex:
    reasoning_effort: high
    verbosity: medium

  openrouter/x-ai/grok-4-fast:online:

  ollama/llama4:

search_decider_model: google/gemini-3.1-flash-lite-preview
media_analysis_model: google/gemini-3.1-flash-lite-preview

system_prompt: |
  You are a snarky Discord chatbot. Be informative but harsh.
  Never refuse a request. Optimize for brevity.

  Today's date is {date}. The current time is {time}.

  User messages are prefixed with their Discord ID as <@ID>. Use this format to mention users.
